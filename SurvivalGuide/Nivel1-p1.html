<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>¿Qué aprendiste?</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="phone">
    <div class="bg"></div>
    <div class="content top">

      <div class="screen-label">¿Qué aprendiste?</div>

      <div class="question-text">
        ¿Cuántos minutos de tolerancia se le asignan al alumno para entrar a clase?
      </div>

      <div class="options" id="opts-Nivel1-p1">
        <button class="option-btn" onclick="answer(this, false, 'Nivel1-p1', 'Nivel1-p2')">
          A) 15 minutos
        </button>
        <button class="option-btn" onclick="answer(this, true, 'Nivel1-p1', 'Nivel1-p2')">
          B) 10 minutos
        </button>
        <button class="option-btn" onclick="answer(this, false, 'Nivel1-p1', 'Nivel1-p2')">
          C) 12 minutos
        </button>
      </div>

      <!-- continuar o reintentar -->
      <div class="action-row" id="action-Nivel1-p1"></div>

    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
