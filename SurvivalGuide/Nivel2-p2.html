<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>¿Qué aprendiste?</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="phone">
    <div class="bg"></div>
    <div class="content top">

      <div class="screen-label">¿Qué aprendiste?</div>

      <div class="question-text">
        ¿Cuál es la evidencia que representa el 30% de calificación en los tres parciales?
      </div>

      <div class="options" id="opts-Nivel2-p2">
        <button class="option-btn" onclick="answer(this, false, 'Nivel2-p2', 'Nivel3-info')">
          A) Conocimiento
        </button>
        <button class="option-btn" onclick="answer(this, true, 'Nivel2-p2', 'Nivel3-info')">
          B) Producto
        </button>
        <button class="option-btn" onclick="answer(this, false, 'Nivel2-p2', 'Nivel3-info')">
          C) Desempeño
        </button>
      </div>

      <div class="action-row" id="action-Nivel2-p2"></div>

    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
