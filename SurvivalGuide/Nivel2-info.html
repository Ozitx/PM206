<!DOCTYPE html>
<html lang="es">
<head>

<body>

            </tr>
            <tr>
              <td class="row-label">Proyecto I.</td>
              <td>10%</td>
              <td>10%</td>
              <td>50%</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="action-row" style="margin-top: auto;">
        <button class="btn" onclick="window.location.href='Nivel2-p1.html'">
